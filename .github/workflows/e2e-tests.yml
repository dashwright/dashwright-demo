name: 🚀 E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright-ts:
    name: 🎭 Playwright (TypeScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🧪 Run Playwright tests
        run: npx playwright test

      - name: 📤 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-reports/playwright-report/
          retention-days: 30

  webdriverio-js:
    name: 🕷️ WebdriverIO (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-wdio-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-wdio-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🌐 Install Chromium browser
        run: npx playwright install chromium

      - name: 🧪 Run WebdriverIO tests
        run: npx wdio run wdio.conf.ts

      - name: 📤 Upload WebdriverIO report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wdio-report
          path: test-reports/wdio/
          retention-days: 30

  cypress-js:
    name: 🔷 Cypress (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🌐 Install Cypress browsers
        run: npx cypress install --browser chrome

      - name: 🧪 Run Cypress tests
        run: npx cypress run --browser chrome

      - name: 📤 Upload Cypress report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: test-reports/cypress/
          retention-days: 30

  selenium-js:
    name: 🌈 Selenium (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-selenium-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-selenium-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🌐 Install Chromium & ChromeDriver
        run: |
          npx playwright install chromium
          npm install -D chromedriver
          export CHROME_BIN=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")

      - name: 🧪 Run Selenium tests
        run: npx cross-env CHROME_BIN=/root/.cache/ms-playwright/chromium-*/chrome-linux/chrome npm run test:selenium
