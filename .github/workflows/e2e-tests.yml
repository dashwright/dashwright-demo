name: 🚀 E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright:
    name: 🎭 Playwright (TypeScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/playwright-report

      - name: 🧪 Run Playwright tests
        run: npx playwright test

      - name: 📤 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-reports/playwright-report/
          retention-days: 30

  wdio:
    name: 🕷️ WebdriverIO (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-wdio-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-wdio-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🌐 Install Chromium browser
        run: npx playwright install chromium

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/wdio-report

      - name: 🧪 Run WebdriverIO tests
        run: npx wdio run wdio.conf.ts

      - name: 📤 Upload WebdriverIO report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wdio-report
          path: test-reports/wdio-report/
          retention-days: 30

  cypress:
    name: 🔷 Cypress (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🖥️ Install Xvfb for Cypress
        run: |
          apt-get update && apt-get install -y xvfb libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth

      - name: 🌐 Install Cypress
        run: npx cypress install

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/cypress-report

      - name: 🧪 Run Cypress tests
        run: npx cypress run --browser chrome

      - name: 📄 Convert Cypress JUnit to HTML
        run: |
          pip3 install junit2html || pip install junit2html
          junit2html test-reports/cypress-report/test-results.xml test-reports/cypress-report/cypress.html 2>/dev/null || true

      - name: 📤 Upload Cypress report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: test-reports/cypress-report/
          retention-days: 30

  selenium:
    name: 🌈 Selenium (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-selenium-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-selenium-

      - name: 📦 Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🌐 Install Chromium & ChromeDriver
        run: |
          npx playwright install chromium
          npm install -D chromedriver

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/selenium-report

      - name: 🧪 Run Selenium tests
        run: CHROME_BIN=/root/.cache/ms-playwright/chromium-*/chrome-linux/chrome npm run test:selenium

      - name: 📤 Upload Selenium report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-report
          path: test-reports/selenium-report/
          retention-days: 30
