name: 🚀 E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  playwright:
    name: 🎭 Playwright (TypeScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📥 Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/playwright-report test-reports/ctrf

      - name: 🧪 Run Playwright tests
        run: npx playwright test

      - name: 📣 Publish E2E Test Summary
        uses: ctrf-io/github-actions-test-reporter@v1
        if: always()
        with:
          report-path: test-reports/ctrf/*.json

      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-reports/playwright-report/
          retention-days: 30

      - name: 📤 Upload monocart Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monocart-report
          path: test-reports/monocart/
          retention-days: 30

  cypress:
    name: 🔷 Cypress (JavaScript)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-cypress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: 📥 Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: 🖥️ Install Xvfb and Python for Cypress
        run: |
          apt-get update && apt-get install -y xvfb libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth python3 python3-pip

      - name: 🌐 Install Cypress
        run: npx cypress install

      - name: 📁 Create Test Reports Directory
        run: mkdir -p test-reports/cypress-report

      - name: 🧪 Run Cypress tests
        run: npx cypress run --browser electron

      - name: 📄 Generate HTML Report
        run: node scripts/generate-cypress-html.js

      - name: 📤 Upload Cypress report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report
          path: test-reports/cypress-report/
          retention-days: 30
